<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>事務所ライブラリ横断ビューワー</title>
<link rel="stylesheet" href="/viewer.css">
</head>
<body>
<header class="topbar">
  <h1>事務所ライブラリ <span class="muted">横断ビューワー</span></h1>
  <div class="search">
    <input id="q" type="search" placeholder="論点・章節で検索（例：時効の起算点）" autocomplete="off">
    <button id="go">検索</button>
  </div>
  <div id="legend" class="legend"></div>
</header>

<main>
  <section id="results" class="pane">
    <div class="pane-head">検索結果</div>
    <div id="results-body" class="pane-body">
      <p class="hint">論点を入力して検索すると、<b>書名・章節・ページ</b>に着地し、4つの図書館（自炊PDF／ベンコム／リーガルライブラリ／物理本）へワンクリックで飛べます。</p>
    </div>
  </section>

  <section id="detail" class="pane">
    <div class="pane-head">
      <span id="detail-title">書誌 / 目次</span>
      <span id="detail-actions"></span>
    </div>
    <div id="detail-body" class="pane-body">
      <p class="hint">検索結果の本を選ぶと、目次ツリー・全図書館リンク・目次コピーを表示します。</p>
    </div>
  </section>
</main>

<div id="toast" class="toast"></div>
<script src="/src/deeplink.js"></script>
<script src="/viewer.js"></script>
</body>
</html>
