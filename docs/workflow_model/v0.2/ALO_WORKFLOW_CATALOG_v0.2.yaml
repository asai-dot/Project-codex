# source_request: docs/workflow_model/REQUEST_v0.2.md
# premise: Box=文書正本 / Salesforce=業務制御塔 / 自然発生データ優先 / Raw・Canonical・Derived分離
#
# === 重要な読み方（スナップショット注記） ===
# 本カタログは v0.2 の done 済み成果物（Phase0 現状インベントリ / Phase1 質問トリアージ /
# Phase2 Box実査 / Gmail 3トレース証跡台帳 / Owner Grill Pack / event schema v0.2）を統合した
# 「現時点スナップショット」である。以下は未了:
#   - SF/LEALA 実査(W-20260624-110) は コネクタ不在で BLOCKED（未観測）。
#   - 浅井先生グリル(W-20260624-140 / G-01..G-20) の回答は未取得（裁定待ち）。
# したがって確定していない値には status: provisional と pending: (sf_survey|owner_grill) を付し、
# 確定事実（v0.1原本に記載/Box実査で観測）と混同しない。捏造禁止: 根拠の無い値は pending。
#
# 各要素の凡例:
#   source:        どの先行成果物に由来するか
#   confirm_status / status:
#                  confirmed       = v0.1原本に確定記載 or Box実査で観測した事実
#                  observed         = Gmail等の自然発生データから観測（confidence付・人間未承認）
#                  provisional      = 仮説/提案。未確定（裏取り or 裁定が要る）
#   pending:       provisional を確定させる手段（sf_survey=SF実査 / owner_grill=浅井裁定 /
#                  staff_interview=中森聴取 / ext_se=外部SE確認 / box_followup=追加Box実査）
#
# v0.1原本の構造は「原本にこう書かれている」という事実であって、業務の現場実態として
# 確定した意味ではない（Phase0 の区分に従う）。23フロー中22本は原本で `要確認`、
# 245問は全件 `未回答`、決定14件は全件 `未決`。

