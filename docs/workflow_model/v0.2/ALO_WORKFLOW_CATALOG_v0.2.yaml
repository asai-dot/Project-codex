# =====================================================================
# 10. states — 5状態機械（53状態）。Delivery/Deadline独立化はG-05未決。
# =====================================================================
states:
  note: "owner裁定 G-05 で 7本に確定（W-180）: Consultation/Matter/WorkItem/Document/Finance + Delivery独立 + Deadline独立。期限≠納品（期限は納品とは限らない）ため Delivery/Deadline を独立機械へ昇格。pending(owner_grill) 解消。"
  machine_count: 7
  owner_confirmed:
    decision: D-022
    grill: G-05
    worker_task: W-20260624-180
    status: confirmed
  declared_observed_split:
    status: confirmed   # owner裁定 G-04（W-180）。declared/observed を2つに分けて持ち突合
    grill: G-04
    decision: D-004
    note: "ゲート通過は declared 必須、observed は監視・先行検知（D-004/G-04）。Ledger は basis: observed|declared を付与済。owner裁定で『2つに分けて持ち突合』を確定。"
  two_stage_close:    # owner裁定 G-09（W-180）2段クローズを終端に
    status: confirmed
    grill: G-09
    decision: D-024
    stages:
      - {stage: 1, name: 法的終了, condition: 案件が実体的に終了}
      - {stage: 2, name: 事務クローズ完了, condition: 原本返却済 AND 預り金ゼロ(精算済) AND 報酬確定}
    order: 案件終了 → 原本返却 → 預り金ゼロ → クローズ
    applies_to: [matter, finance, document]
    note: "Matter: closing(①法的終了)→closed(②事務クローズ)。終了報告済判定=成果物送付 or 報酬請求通知が出ている(G-15/D-027)。"
  machines:
    - id: SM-consultation
      machine: consultation
      state_count: 17
      states: [new, inquiry, identity_checked, conflict_pending, conflict_pass, conflict_fail, triaged, scheduling, scheduled, consulted, followup, proposal_pending, proposal_sent, decision_pending, engagement_pending, converted, closed_lost]
      confirm_status: confirmed
      source: Phase0 §6 (06シート)
    - id: SM-matter
      machine: matter
      state_count: 11
      states: [onboarding, active, waiting_client, waiting_opponent, waiting_court, drafting, review, filing, resolution_pending, closing, closed]
      confirm_status: confirmed
      source: Phase0 §6
      note: "Deadline は SM-deadline へ独立化（owner裁定 G-05/G-20 W-180）。matter は waiting_* を待ち状態として保持しつつ期限の正本は SM-deadline/Salesforce。closing(①法的終了)→closed(②事務クローズ完了) の2段クローズ（G-09/D-024）。"
    - id: SM-work_item
      machine: work_item
      state_count: 6
      states: [open, in_progress, waiting, blocked, review, complete]
      schema_extra: [cancelled]   # event_schema WorkItem.status に cancelled あり
      confirm_status: confirmed
      source: Phase0 §6
    - id: SM-document
      machine: document
      state_count: 10
      states: [received, classified, working_draft, internal_review, client_review, approved, sent, filed, accepted, superseded]
      schema_extra: [archived, quarantine]
      confirm_status: confirmed
      source: Phase0 §6
      note: "Delivery(sent/filed/accepted)は SM-delivery へ独立化（owner裁定 G-05 W-180）。document はライフサイクル状態、送付/到達/受理は SM-delivery が持つ。"
    - id: SM-finance
      machine: finance
      state_count: 9
      states: [quote_draft, quote_sent, invoice_draft, invoice_sent, acknowledged, part_paid, paid, overdue, reconciled]
      confirm_status: confirmed
      source: Phase0 §6
      note: "reconciled=金銭の確定(報酬確定・預り金/実費精算・振替)=人間必須ゲートHG-05/HG-06(マスト3点の1, G-06)。入金の正=銀行通帳(DS-024/G-11)・MoneyForward(DS-016)と突合。MF/通帳未接続のため機械消込は未測定。"
    - id: SM-delivery   # owner裁定 G-05（W-180）で独立機械に昇格（7本目の1）
      machine: delivery
      state_count: 4
      states: [prepared, dispatched, delivered, received]
      confirm_status: confirmed
      grill: G-05
      decision: [D-022, D-012]
      source: G-05; D-012; 06_state_transitions(Delivery行); W-180
      note: "対外文書の最終送付=最終品質チェック(マスト3点の1, HG-04/G-06)。到達正本は SF(制御塔)+会計台帳、Box は送受の文書証跡。"
    - id: SM-deadline   # owner裁定 G-05/G-20（W-180）で独立機械に昇格（7本目の1）
      machine: deadline
      state_count: 4
      states: [registered, met, extended, missed]
      confirm_status: confirmed
      grill: [G-05, G-20]
      decision: [D-022, D-033]
      source: G-05; G-20; 06_state_transitions(Deadline行); W-180
      note: "期限の正本=Salesforce(G-20)。徒過防止=人・Salesforce・AI の多重チェック。SFミラーに Deadline 格納先が無いため新設要(07_sf_mapping c_newtable)。"
  resolved_pending:
    note: "旧 proposed_additional_machines(delivery/deadline) は owner裁定 G-05 で confirmed 化（W-180）。pending(owner_grill) 解消。"
    delivery: {was: provisional, now: confirmed, grill: G-05, decision: D-022}
    deadline: {was: provisional, now: confirmed, grill: [G-05, G-20], decision: [D-022, D-033]}

# =====================================================================
# 11. transitions — 状態遷移（Ledgerで観測した実遷移＋設計上の代表遷移）
# =====================================================================
transitions:
  basis_enum: [observed, declared, rule_derived, human_decision]
  observed_from_ledger:   # Gmail 3トレースで実際に記録された遷移（confidence付）
    - {from: null,                  to: inquiry_received,    machine: consultation, basis: observed,  source: Ledger trace1:0101, confirm_status: observed}
    - {from: consultation_completed, to: proposal_sent,      machine: consultation, basis: observed,  source: Ledger trace1:0102, confirm_status: observed}
    - {from: proposal_sent,         to: proposal_accepted,   machine: consultation, basis: declared,  source: Ledger trace1:0103, confirm_status: observed}
    - {from: proposal_accepted,     to: converted,           machine: consultation, basis: human_decision, source: Ledger trace1:0104(engagement_signed), confirm_status: observed}
  design_representative:   # processes.next_state から導出した代表遷移（仮説）
    - {process: WF-03, gate: "pass/fail/escalate", machine: consultation, confirm_status: provisional, pending: [owner_grill]}
    - {process: WF-11, gate: "成立/失注/保留",      machine: consultation, confirm_status: provisional, pending: [owner_grill]}
    - {process: WF-16, gate: "approve/rework/hold", machine: document,     confirm_status: provisional, pending: [owner_grill]}
    - {process: WF-20, gate: "financially_reconciled", machine: finance,   confirm_status: provisional, pending: [owner_grill, sf_survey]}
    - {process: WF-22, gate: "close/archive/promote",  machine: matter,    confirm_status: provisional, pending: [owner_grill]}
  note: 全遷移チェーン(72イベント×53状態)の網羅マトリクスは SF実査と owner裁定後に確定。

