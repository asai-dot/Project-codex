    statement: "入金=銀行通帳(DS-024)が真実の源(正本)。MoneyForward会計(DS-016)と突合。"
    status: confirmed
    grill: G-11
    decision: D-029
    capture_gap: "MF/銀行通帳ともに未接続のため機械的入金消込は未測定（未接続＝未測定）。"
    source: G-11; D-029; W-180
  catalog:
    - {id: FE-quote,          type: quote,          process: WF-09, source: schema; Box実査(6), confirm_status: provisional}
    - {id: FE-retainer_invoice, type: invoice,      process: WF-12, source: Ledger trace1:0105(損保宛着手金請求), confirm_status: observed}
    - {id: FE-payment_ack,    type: payment,        process: WF-12, subtype: acknowledged_external, source: Ledger; G-04例(支払受付返信), confirm_status: observed}
    - {id: FE-payment,        type: payment,        process: WF-20, source: Ledger trace3, confirm_status: observed, note: "実入金消込は別系統(MF/SF)で要確認"}
    - {id: FE-final_invoice,  type: invoice,        process: WF-20, source: Box実査(7)請求書, confirm_status: provisional, pending: [sf_survey]}
    - {id: FE-trust_deposit,  type: trust_deposit,  process: WF-20, source: Box実査(8)預り資料/見積(預り金), confirm_status: confirmed}
    - {id: FE-expense,        type: expense,        process: WF-20, source: Phase0 DS-007, confirm_status: provisional}
    - {id: FE-refund,         type: refund,         process: WF-20, source: schema; trace3立替金差引後送金, confirm_status: observed}
    - {id: FE-reconciliation, type: reconciliation, process: WF-20, source: D-014 close gate, confirm_status: provisional, pending: [owner_grill]}
    - {id: FE-writeoff,       type: writeoff,       process: WF-20, source: schema(未収扱い), confirm_status: provisional}

# =====================================================================
# 13. human_gates — 人間必須承認ゲート（G-06: 7点）。AI/自動化は提案までで確定不可。
# =====================================================================
human_gates:
  policy: "AI推定は提案レーン（confidence付）に置き、確定は人間承認（G-19）。各ゲートで承認者ロールを指定。"
  status: confirmed   # owner裁定 G-06（W-180）でマスト3点に確定
  grill: G-06
  decision: D-023
  worker_task: W-20260624-180
  mandatory_count: 3
  mandatory:   # マスト3点（required=true）owner裁定 G-06
    - 利益相反チェック
    - 対外文書の最終送付（=対外アウトプットの最終品質チェック）
    - 金銭の確定（報酬確定・預り金精算・振替）
  optional_note: "受任成立(HG-02)・終結(HG-07) は『置けるが必須ではない』(owner G-06)→ optional gate として保持。HG-03(重要方針)も後続キュー2-Aで定義域確定までは optional。"
  source: REQUEST §2; D-007; D-023; G-06; Ledger trace3:0304(送金タイミング=人間判断)
  gates:
    - {id: HG-01, name: コンフリクト確認(利益相反),  process: WF-03, approver_role: 弁護士＋事務局, basis: human_decision, required: true,  mandatory_rank: 1, source: G-06/G-13; D-023, confirm_status: confirmed, pending: [staff_interview], note: "マスト①利益相反。最小データ=相手方・関係者氏名を構造化(G-13)。"}
    - {id: HG-02, name: 受任成立,               process: WF-11, approver_role: 担当弁護士,     basis: human_decision, required: false, optional: true, source: G-06; Ledger trace1:0104; D-023, confirm_status: confirmed, note: "owner裁定: optional(置けるが必須でない)。受任=複数シグナル合成しdeclaredと突合(G-11/D-028)。"}
    - {id: HG-03, name: 重要方針決定,           process: [WF-13, WF-18], approver_role: 担当弁護士, basis: human_decision, required: false, optional: true, source: G-06, confirm_status: provisional, pending: [staff_interview], note: "owner裁定の3マスト外。「重要方針」の定義域は後続キュー2-Aで確定。"}
    - {id: HG-04, name: 対外成果物の最終送付(最終品質チェック), process: WF-17, approver_role: 弁護士/事務局, basis: human_decision, required: true, mandatory_rank: 2, source: G-06; Box実査(9); D-023, confirm_status: confirmed, note: "マスト②対外文書の最終送付=最終品質チェック。SM-delivery(prepared→dispatched)に対応。"}
    - {id: HG-05, name: 報酬確定(金銭の確定),    process: WF-20, approver_role: 弁護士＋事務局長, basis: human_decision, required: true, mandatory_rank: 3, source: G-06; D-023, confirm_status: confirmed, note: "マスト③金銭の確定の一部=報酬確定。"}
    - {id: HG-06, name: 預り金・実費精算/振替,   process: WF-20, approver_role: 弁護士＋事務局長, basis: human_decision, required: true, mandatory_rank: 3, source: G-06; Ledger trace3:0304; D-023, confirm_status: confirmed, note: "マスト③金銭の確定の一部=預り金精算・振替。入金の正=銀行通帳(G-11)。"}
    - {id: HG-07, name: 終結（close gate）,      process: WF-22, approver_role: 担当弁護士＋事務局, basis: human_decision, required: false, optional: true, source: G-06/G-09; D-023, confirm_status: confirmed, note: "owner裁定: optional。2段クローズ②事務クローズ完了の最終確認(G-09/D-024)。"}
  close_gate_conditions:   # G-09 2段クローズ（owner裁定 W-180）
    status: confirmed
    grill: G-09
    decision: [D-014, D-024, D-027]
    two_stage: {stage1: 法的終了(案件実体終了), stage2: 事務クローズ完了(原本返却済・預り金ゼロ・報酬確定)}
    closing_report_judgement: "『終了報告済』判定=専用書類でなく『成果物送付 or 報酬請求通知が出ている』(G-15/D-027)"
    source: D-014; D-024; D-027; G-09; G-15; EVD-007
    conditions:
      - 未完WorkItem無
      - 残期限無
      - 最終請求確定
      - 未収扱い確定
      - 預り金・実費精算済
      - 預り原本 返却済or保管理由
      - 最終成果物送付済
      - 終了報告送付済
      - Box正本確定
      - SF終了状態が人間承認済

