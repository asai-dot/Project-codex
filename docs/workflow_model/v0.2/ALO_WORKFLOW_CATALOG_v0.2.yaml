# =====================================================================
# 6. work_items — WorkItem 必須項目モデル（G-08）
# =====================================================================
work_items:
  required_fields_owner:    # owner裁定 G-08（W-180）: 担当/期限/案件/次アクション の4点必須
    - 担当(owner)
    - 期限(due)
    - 案件(matter/consultation_ref)
    - 次アクション(next_action)
  required_fields:    # 実装フィールド（4必須 + 運用補助。status/waiting_on/completion_evidence は close gate 用に保持）
    - owner
    - due
    - matter_ref
    - next_action
    - status
    - waiting_on
    - completion_evidence
  chatwork_mapping:   # owner裁定 G-08: Chatworkタスク → WorkItem 対応づけ
    source_system: DS-023
    map: "Chatwork task(担当・期限) → WorkItem(担当/期限/案件/次アクション)"
    note: "Chatworkで振るタスクと項目を揃える(G-08/D-025/D-028→D-028は受任、本項はD-025)。"
  status_enum: [open, in_progress, waiting, blocked, review, complete, cancelled]
  confirm_status: confirmed   # owner裁定 G-08（W-180）
  grill: G-08
  decision: [D-011, D-025]
  capture_gap: "Ledger 全WorkItem で due_at と completion_evidence_refs が null（自然発生データだけでは埋まらない実証）。Chatworkタスク取込で 担当/期限 を補完予定（タスク粒度の取込は要確認）。"
  source: Phase0 D-011; G-08; event_schema WorkItem; Ledger trace1-3; W-180
  catalog:
    - {id: WI-doc-collect,       title: 事前資料収集,           process: WF-06, confirm_status: provisional}
    - {id: WI-proposal-draft,    title: 提案/見積作成,          process: WF-09, confirm_status: provisional}
    - {id: WI-proposal-followup, title: 契約書案への回答確認,   process: WF-10, status_observed: open, due_observed: null, source: Ledger wi:trace1:proposal_followup, confirm_status: observed}
    - {id: WI-plan,              title: 初期計画策定,           process: WF-13, confirm_status: provisional}
    - {id: WI-task,              title: 調査・起案・作業,        process: [WF-15, WF-18], confirm_status: provisional}
    - {id: WI-review,            title: 内部レビュー,           process: WF-16, confirm_status: provisional}
    - {id: WI-delivery,          title: 納品・送付・提出,        process: WF-17, confirm_status: provisional}
    - {id: WI-reconcile,         title: 最終精算,               process: WF-20, confirm_status: provisional}
    - {id: WI-return-originals,  title: 原本返却,               process: WF-21, confirm_status: provisional}

