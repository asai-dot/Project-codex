# =====================================================================
# 15. evidence_types — 証跡ソース種別（SourceRef.source_kind enum）+ provenance層
# =====================================================================
evidence_types:
  source_kind_enum:   # event_schema SourceRef.source_kind
    - {id: EVT-email,            kind: email,            system: Gmail,      confirm_status: confirmed, observed_in_ledger: true}
    - {id: EVT-call,             kind: call,             system: Dialpad,    confirm_status: confirmed, capture_gap: connector_absent}
    - {id: EVT-sms,              kind: sms,              system: Dialpad,    confirm_status: confirmed}
    - {id: EVT-meeting,          kind: meeting,          system: Notta/Meet, confirm_status: confirmed, capture_gap: connector_absent}
    - {id: EVT-calendar,         kind: calendar,         system: Google Calendar, confirm_status: confirmed}
    - {id: EVT-box_file,         kind: box_file,         system: Box,        confirm_status: confirmed, observed_in_box_survey: true}
    - {id: EVT-box_event,        kind: box_event,        system: Box,        confirm_status: confirmed}
    - {id: EVT-salesforce_record, kind: salesforce_record, system: Salesforce, confirm_status: confirmed, survey_status: pending_sf_survey}
    - {id: EVT-postal,           kind: postal,           system: 郵便,        confirm_status: confirmed}
    - {id: EVT-fax,              kind: fax,              system: FAX,        confirm_status: confirmed}
    - {id: EVT-court_portal,     kind: court_portal,     system: MINTS/Teams, confirm_status: confirmed}
    - {id: EVT-invoice,          kind: invoice,          system: Money Forward, confirm_status: confirmed}
    - {id: EVT-bank_transaction, kind: bank_transaction, system: MF会計/銀行明細, confirm_status: confirmed}
    - {id: EVT-manual_statement, kind: manual_statement, system: 手入力,      confirm_status: confirmed}
    - {id: EVT-system_log,       kind: system_log,       system: 各システムログ, confirm_status: confirmed}
  provenance_model:   # event_schema Provenance（3分離 G-19）
    required: [ingest_run_id, extractor_version, source_refs]
    separation: [observed, ai_estimated, human_decision]   # 混同禁止（G-19/REQUEST §2）
    append_only: true   # D-003/D-010: 訂正は invalidates_event_ids + 新確定リンク
    ai_boundary_rule:   # owner裁定 G-19（W-180）Derived層規約
      status: confirmed
      grill: G-19
      decision: D-031
      rule: "AI出力は常に『推定(ai_estimated)』。人間承認は確定行為だが、AI出力自体を observed/human_decision へ昇格させない（ずっと推定のまま）。確定は人間の判断レコード(human_decision)として別に記録する。"
      layer: derived
      note: "Derived層(llm_category/llm_summary 等)は推定レーン。承認しても推定の出自は保持。混同禁止(forbidden: ai_estimate_as_human_decision)。"
    source: event_schema Provenance; G-03; G-19; D-031; W-180
  evidence_traces:   # Gmail 3トレース（実査証跡台帳）
    - {trace: trace1, summary: 相談→提案→受任(損保=第三者支払者), events: "0101-0106", confirm_status: observed, source: Ledger}
    - {trace: trace2, summary: 失注(受任非到達), confirm_status: observed, source: Ledger, note: 正式失注通知は未確認・浅井聴取要}
    - {trace: trace3, summary: 解決→精算途中(自賠責/任意保険), confirm_status: observed, source: Ledger}

# =====================================================================
# 16. metrics — PoC1/PoC2 KPI（REQUEST §6 / G-07/G-08/G-12）
# =====================================================================
metrics:
  status: confirmed_definition   # owner裁定で定義は確定。現状値は SF実査/コネクタ接続後（未接続=未測定）
  pending: [sf_survey]   # 現状値の算出は SF/コネクタ接続後
  measurement_gap: "Notta/MoneyForward/銀行通帳 未接続由来の KPI（相談実施時間・入金確定時間・入金消込率）は『未接続＝未測定』。仮説で埋めない。"
  loss_reason_enum: ["①当方お断り", "②先方失注/離脱", "③受任に至らず", "④その他"]   # G-12/D-030
  source: REQUEST §6 KPI; G-07; G-08; G-12; D-030; W-180
  poc1:
    scope: 相談→受任ファネル（問合せ→本人確認→コンフリ→トリアージ→日程→資料→相談→見積→契約案→受任）
    pending: [owner_grill]   # G-07 PoC1スコープ確定
    kpis:
      - {id: KPI-P1-01, name: 初回応答までの時間,   type: duration, computable_from: [DS-011, DS-001], confirm_status: provisional}
      - {id: KPI-P1-02, name: 相談確定までの時間,   type: duration, computable_from: [DS-001, DS-014], confirm_status: provisional}
      - {id: KPI-P1-03, name: 見積送付までの時間,   type: duration, computable_from: [DS-001, DS-009], confirm_status: provisional}
      - {id: KPI-P1-04, name: 契約成立までの時間,   type: duration, computable_from: [DS-001, DS-002], confirm_status: provisional}
      - {id: KPI-P1-05, name: 次行動未設定率,       type: ratio, relates_exception: WI欠落(due/owner), confirm_status: provisional, pending: [sf_survey]}
      - {id: KPI-P1-06, name: 流入経路不明率,       type: ratio, relates_exception: EXC-source_unknown, definition_basis: "流入経路=必須〜準必須(G-12)。未入力件数/全相談", confirm_status: confirmed_definition, pending: [sf_survey], source: G-12; D-030}
      - {id: KPI-P1-07, name: 失注理由未入力率,     type: ratio, relates_exception: EXC-loss_reason_missing, definition_basis: "失注理由=enum選択式(G-12)。enum未選択件数/全失注。『お断り』と『失注』区別", confirm_status: confirmed_definition, pending: [sf_survey], source: G-12; D-030}
      - {id: KPI-P1-08, name: イベント未紐付け率,   type: ratio, relates_exception: EXC-unlinked_event, confirm_status: provisional}
  poc2:
    scope: 解決→最終請求→預り金/実費精算→原本返却→終了報告→既済化
    pending: [owner_grill]   # G-07 / D-009
    kpis:
      - {id: KPI-P2-01, name: 最終請求確定までの時間, type: duration, computable_from: [DS-007, DS-015], confirm_status: provisional}
      - {id: KPI-P2-02, name: 預り金/実費精算完了率,  type: ratio, relates: [HG-06], confirm_status: provisional}
      - {id: KPI-P2-03, name: 原本返却完了率,         type: ratio, relates: [WI-return-originals], confirm_status: provisional}
      - {id: KPI-P2-04, name: 終了報告送付率,         type: ratio, relates_exception: 業務終了報告書未確定(G-15), confirm_status: provisional, pending: [owner_grill, box_followup]}
      - {id: KPI-P2-05, name: close gate未通過滞留率, type: ratio, relates: close_gate_conditions, confirm_status: provisional, pending: [owner_grill]}
      - {id: KPI-P2-06, name: 未収率,                 type: ratio, event: invoice_overdue, confirm_status: provisional, pending: [sf_survey]}
      - {id: KPI-P2-07, name: declared/observed乖離率, type: ratio, relates: declared_observed_split, source: G-04, confirm_status: provisional, pending: [owner_grill]}
