name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run purchase_recommender engine tests (stdlib only, no external data)
        run: python tests/test_purchase_recommender.py
      - name: Run Supabase data-source tests (fake query_runner, no DB)
        run: python tests/test_supabase_source.py
      - name: Run pipeline dashboard/probe tests (stdlib only, synthetic manifest)
        run: python tests/test_pipeline.py
      - name: Run legallib join tests (stdlib only, synthetic fixtures)
        run: python tests/test_legallib_join.py
      - name: Run legallib handoff-tools tests (stdlib only, synthetic fixtures)
        run: python tests/test_handoff_tools.py
      - name: Run edition/repair/concordance subsystem tests (stdlib only, synthetic fixtures)
        run: |
          set -e
          for t in \
            tests/test_c1_readiness.py tests/test_concordance.py tests/test_concordance_pipeline.py \
            tests/test_data_health.py tests/test_edition_adversarial.py tests/test_edition_identity_v2.py \
            tests/test_golden.py tests/test_golden_edition.py tests/test_golden_repair.py \
            tests/test_phase0_inventory.py tests/test_publisher_norm.py tests/test_quarantine_ledger.py \
            tests/test_regression_taxonomy.py tests/test_repair.py tests/test_resolver_resend.py \
            tests/test_tocadopt.py tests/test_v031_authority.py tests/test_v031_gates.py; do
            echo "== $t =="; python "$t"
          done
      - name: Install pytest (for packaged tools)
        run: pip install pytest
      - name: Run alo-gpt-audit package tests (stdlib only, synthetic lanes)
        run: PYTHONPATH=src python -m pytest -q
        working-directory: tools/gpt_audit
